<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VC3D Web Volume Viewer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #1a1a1a;
    color: #ddd;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
    height: 100vh;
}
#toolbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 48px;
    background: #2a2a2a;
    border-bottom: 1px solid #444;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 16px;
    z-index: 10;
    font-size: 13px;
}
#toolbar label { color: #aaa; }
#toolbar input[type="text"] {
    background: #333;
    border: 1px solid #555;
    color: #eee;
    padding: 4px 8px;
    border-radius: 4px;
    width: 400px;
    font-family: monospace;
    font-size: 12px;
}
#toolbar button {
    background: #4a7fff;
    color: white;
    border: none;
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
}
#toolbar button:hover { background: #6090ff; }
#toolbar button:disabled { background: #555; cursor: default; }
#canvas-container {
    position: fixed;
    top: 48px;
    left: 0;
    right: 0;
    bottom: 32px;
}
canvas {
    width: 100%;
    height: 100%;
    display: block;
    image-rendering: pixelated;
}
#statusbar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 32px;
    background: #2a2a2a;
    border-top: 1px solid #444;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 24px;
    font-size: 12px;
    color: #888;
    font-family: monospace;
}
#statusbar .val { color: #ccc; }
#loading-overlay {
    position: fixed;
    top: 48px;
    left: 0;
    right: 0;
    bottom: 32px;
    background: rgba(0,0,0,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 5;
    font-size: 18px;
    color: #aaa;
}
#loading-overlay.hidden { display: none; }
</style>
</head>
<body>

<div id="toolbar">
    <label>Zarr URL:</label>
    <input type="text" id="zarr-url" value="" placeholder="https://example.com/volume.zarr">
    <button id="load-btn">Load</button>
    <span id="level-info" style="color:#888"></span>
</div>

<div id="canvas-container">
    <canvas id="viewport"></canvas>
</div>

<div id="loading-overlay" class="hidden">
    <span id="loading-text">Loading...</span>
</div>

<div id="statusbar">
    <span>Z: <span class="val" id="stat-z">0.0</span></span>
    <span>Zoom: <span class="val" id="stat-zoom">0.50</span></span>
    <span>Level: <span class="val" id="stat-level">0</span></span>
    <span>Chunks: <span class="val" id="stat-chunks">0</span></span>
    <span>Cache: <span class="val" id="stat-cache">0 MB</span></span>
    <span>Pending: <span class="val" id="stat-pending">0</span></span>
    <span id="stat-voxel"></span>
</div>

<script src="vc3d-web.js"></script>
<script>
// ============================================================================
// VC3D Web Viewer — uses RenderCore C API via WASM
// ============================================================================

const state = {
    wasm: null,         // WASM module instance
    gl: null,           // WebGL context
    texture: null,      // WebGL texture for display
    program: null,      // WebGL shader program

    zarrUrl: '',        // Base URL of zarr volume
    levels: [],         // Array of {shape: [z,y,x], chunks: [z,y,x]}
    compressor: null,   // 'blosc' | 'zstd' | null (raw)

    // Interaction
    dragging: false,
    dragStartX: 0,
    dragStartY: 0,

    // Chunk loading
    pendingFetches: 0,
    loadedChunks: new Set(),    // "level/iz/iy/ix" strings
    failedChunks: new Set(),
    renderScheduled: false,
};

// --- WebGL setup ---

function initWebGL(canvas) {
    const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
    if (!gl) { alert('WebGL not supported'); return null; }

    const vsSource = `
        attribute vec2 aPos;
        varying vec2 vUV;
        void main() {
            vUV = aPos * 0.5 + 0.5;
            vUV.y = 1.0 - vUV.y;
            gl_Position = vec4(aPos, 0.0, 1.0);
        }
    `;
    // ARGB32 -> swap channels: texture has BGRA byte order when uploaded as RGBA
    const fsSource = `
        precision mediump float;
        varying vec2 vUV;
        uniform sampler2D uTex;
        void main() {
            vec4 c = texture2D(uTex, vUV);
            gl_FragColor = vec4(c.b, c.g, c.r, c.a);
        }
    `;

    function compile(type, src) {
        const s = gl.createShader(type);
        gl.shaderSource(s, src);
        gl.compileShader(s);
        if (!gl.getShaderParameter(s, gl.COMPILE_STATUS))
            console.error('Shader error:', gl.getShaderInfoLog(s));
        return s;
    }

    const prog = gl.createProgram();
    gl.attachShader(prog, compile(gl.VERTEX_SHADER, vsSource));
    gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fsSource));
    gl.linkProgram(prog);

    const buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

    const aPos = gl.getAttribLocation(prog, 'aPos');
    gl.enableVertexAttribArray(aPos);
    gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

    const tex = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);

    state.gl = gl;
    state.texture = tex;
    state.program = prog;
    return gl;
}

function uploadToGL(pixelPtr, width, height) {
    const gl = state.gl;
    if (!gl || !pixelPtr) return;

    // RenderCore outputs ARGB32 as uint32. Read as raw bytes (4 * width * height).
    const pixels = new Uint8Array(state.wasm.HEAPU8.buffer, pixelPtr, width * height * 4);
    gl.bindTexture(gl.TEXTURE_2D, state.texture);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, width, height, 0, gl.RGBA, gl.UNSIGNED_BYTE, pixels);

    gl.viewport(0, 0, gl.canvas.width, gl.canvas.height);
    gl.useProgram(state.program);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

// --- Zarr metadata loading ---

async function fetchJson(url) {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${url}`);
    return resp.json();
}

async function loadZarrMetadata(baseUrl) {
    baseUrl = baseUrl.replace(/\/+$/, '');
    state.zarrUrl = baseUrl;

    const levels = [];
    for (let lvl = 0; lvl < 20; lvl++) {
        try {
            const meta = await fetchJson(`${baseUrl}/${lvl}/.zarray`);
            const shape = meta.shape || [0, 0, 0];
            const chunks = meta.chunks || [128, 128, 128];
            const compressor = meta.compressor || null;
            levels.push({ shape, chunks, compressor, dtype: meta.dtype || '|u1' });
        } catch (e) {
            break;
        }
    }

    if (levels.length === 0) throw new Error('No zarr levels found at ' + baseUrl);

    state.levels = levels;
    state.compressor = levels[0].compressor;

    // Reset and configure WASM
    state.wasm._wasm_reset_levels();
    state.loadedChunks.clear();
    state.failedChunks.clear();

    for (const lvl of levels) {
        state.wasm._wasm_add_level(
            lvl.shape[0], lvl.shape[1], lvl.shape[2],
            lvl.chunks[0], lvl.chunks[1], lvl.chunks[2]
        );
    }

    // Set initial plane: Z-axis normal, origin at volume center
    const s = levels[0].shape;
    state.wasm._wasm_set_plane(
        s[2] / 2.0, s[1] / 2.0, s[0] / 2.0,  // origin: center of volume
        0.0, 0.0, 1.0                           // normal: Z axis
    );

    updateLevelInfo();
    return levels;
}

// --- Chunk decompression ---

async function decompressChunk(compressed, compressorMeta) {
    if (!compressorMeta) return compressed;

    const id = compressorMeta.id || compressorMeta;
    if (id === 'blosc') {
        return decompressBlosc(compressed);
    } else if (id === 'zstd') {
        console.warn('zstd decompression not yet implemented in JS');
        return compressed;
    }
    return compressed;
}

function decompressBlosc(input) {
    const view = new DataView(input.buffer, input.byteOffset, input.byteLength);
    const nbytes = view.getUint32(4, true);
    console.warn('Blosc decompression stub: assuming uncompressed blosc (clevel=0). ' +
                 'For compressed data, integrate blosc.js or c-blosc WASM.');
    return new Uint8Array(input.buffer, input.byteOffset + 16, nbytes);
}

// --- Chunk fetching ---

async function fetchChunk(level, iz, iy, ix) {
    const key = `${level}/${iz}/${iy}/${ix}`;
    if (state.loadedChunks.has(key) || state.failedChunks.has(key)) return;

    const url = `${state.zarrUrl}/${level}/${iz}.${iy}.${ix}`;

    state.pendingFetches++;
    updateStatus();

    try {
        const resp = await fetch(url);
        if (!resp.ok) {
            if (resp.status === 404 || resp.status === 403) {
                state.failedChunks.add(key);
                return;
            }
            throw new Error(`HTTP ${resp.status}`);
        }

        let data = new Uint8Array(await resp.arrayBuffer());

        const lvlMeta = state.levels[level];
        if (lvlMeta && lvlMeta.compressor) {
            data = await decompressChunk(data, lvlMeta.compressor);
        }

        // Handle uint16 -> uint8 conversion
        if (lvlMeta && (lvlMeta.dtype === '<u2' || lvlMeta.dtype === '>u2' ||
                        lvlMeta.dtype === '<i2' || lvlMeta.dtype === '>i2')) {
            const u16 = new Uint16Array(data.buffer, data.byteOffset,
                                        data.byteLength / 2);
            const u8 = new Uint8Array(u16.length);
            for (let i = 0; i < u16.length; i++) {
                u8[i] = Math.min(255, u16[i] >> 8);
            }
            data = u8;
        }

        // Pass to WASM
        const ptr = state.wasm._malloc(data.length);
        state.wasm.HEAPU8.set(data, ptr);
        state.wasm._wasm_load_chunk(level, iz, iy, ix, ptr, data.length);
        state.wasm._free(ptr);

        state.loadedChunks.add(key);
        scheduleRender();
    } catch (e) {
        console.warn(`Failed to fetch chunk ${key}:`, e.message);
        state.failedChunks.add(key);
    } finally {
        state.pendingFetches--;
        updateStatus();
    }
}

// Determine which chunks are visible and fetch them.
// Uses the RenderCore camera state to compute the visible region.
function fetchVisibleChunks() {
    if (state.levels.length === 0) return;

    const level = state.wasm._wasm_pyramid_level();
    const lvl = state.levels[level];
    if (!lvl) return;

    const canvas = document.getElementById('viewport');
    const w = canvas.width;
    const h = canvas.height;
    const scale = state.wasm._wasm_scale();
    const zOff = state.wasm._wasm_z_offset();

    const cs = lvl.chunks;
    const invZoom = 1.0 / scale;
    const levelScale = 1.0 / (1 << level);

    // Read the actual origin from the RenderCore (tracks pan offsets).
    // For the Z-normal axis-aligned case: origin.x maps to voxel X,
    // origin.y maps to voxel Y, origin.z + zOff maps to voxel Z.
    const originX = state.wasm._wasm_origin_x();
    const originY = state.wasm._wasm_origin_y();
    const originZ = state.wasm._wasm_origin_z() + zOff;

    const halfW = (w / 2.0) * invZoom;
    const halfH = (h / 2.0) * invZoom;

    // Visible world-space range, scaled to this pyramid level
    const minX = (originX - halfW) * levelScale;
    const maxX = (originX + halfW) * levelScale;
    const minY = (originY - halfH) * levelScale;
    const maxY = (originY + halfH) * levelScale;
    const minZ = originZ * levelScale;
    const maxZ = originZ * levelScale;

    const minCz = Math.max(0, Math.floor((minZ - 1) / cs[0]));
    const maxCz = Math.min(Math.ceil(lvl.shape[0] / cs[0]) - 1,
                           Math.floor((maxZ + 1) / cs[0]));
    const minCy = Math.max(0, Math.floor(minY / cs[1]));
    const maxCy = Math.min(Math.ceil(lvl.shape[1] / cs[1]) - 1,
                           Math.floor(maxY / cs[1]));
    const minCx = Math.max(0, Math.floor(minX / cs[2]));
    const maxCx = Math.min(Math.ceil(lvl.shape[2] / cs[2]) - 1,
                           Math.floor(maxX / cs[2]));

    for (let cz = minCz; cz <= maxCz; cz++) {
        for (let cy = minCy; cy <= maxCy; cy++) {
            for (let cx = minCx; cx <= maxCx; cx++) {
                fetchChunk(level, cz, cy, cx);
            }
        }
    }
}

// --- Rendering ---

function scheduleRender() {
    if (state.renderScheduled) return;
    state.renderScheduled = true;
    requestAnimationFrame(doRender);
}

function doRender() {
    state.renderScheduled = false;
    if (!state.wasm) return;

    state.wasm._wasm_render();
    const pixelPtr = state.wasm._wasm_pixels();
    const w = state.wasm._wasm_width();
    const h = state.wasm._wasm_height();
    uploadToGL(pixelPtr, w, h);
    updateStatus();
}

// --- UI ---

function updateStatus() {
    const zOff = state.wasm ? state.wasm._wasm_z_offset() : 0;
    const scale = state.wasm ? state.wasm._wasm_scale() : 0.5;
    const level = state.wasm ? state.wasm._wasm_pyramid_level() : 0;

    document.getElementById('stat-z').textContent = zOff.toFixed(1);
    document.getElementById('stat-zoom').textContent = scale.toFixed(2);
    document.getElementById('stat-level').textContent = level;

    if (state.wasm) {
        document.getElementById('stat-chunks').textContent = state.wasm._wasm_cache_count();
        const mb = (state.wasm._wasm_cache_bytes() / (1024 * 1024)).toFixed(1);
        document.getElementById('stat-cache').textContent = mb + ' MB';
    }
    document.getElementById('stat-pending').textContent = state.pendingFetches;
}

function updateLevelInfo() {
    if (state.levels.length === 0) {
        document.getElementById('level-info').textContent = '';
        return;
    }
    const numLevels = state.wasm._wasm_num_levels();
    const level = state.wasm._wasm_pyramid_level();
    const lvl = state.levels[level];
    document.getElementById('level-info').textContent =
        `Level ${level}/${numLevels - 1}: ` +
        `${lvl.shape[2]}x${lvl.shape[1]}x${lvl.shape[0]} ` +
        `(chunks ${lvl.chunks[2]}x${lvl.chunks[1]}x${lvl.chunks[0]})`;
}

function showLoading(msg) {
    document.getElementById('loading-text').textContent = msg;
    document.getElementById('loading-overlay').classList.remove('hidden');
}

function hideLoading() {
    document.getElementById('loading-overlay').classList.add('hidden');
}

function resizeCanvas() {
    const canvas = document.getElementById('viewport');
    const container = document.getElementById('canvas-container');
    canvas.width = container.clientWidth;
    canvas.height = container.clientHeight;
    if (state.wasm) {
        state.wasm._wasm_resize(canvas.width, canvas.height);
    }
    if (state.gl) {
        state.gl.viewport(0, 0, canvas.width, canvas.height);
    }
}

// --- Event handlers ---

function setupEvents() {
    const canvas = document.getElementById('viewport');

    // Mouse wheel: scroll Z slices (or zoom with Ctrl)
    canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        if (e.ctrlKey || e.metaKey) {
            // Zoom toward mouse position
            const factor = e.deltaY > 0 ? 0.9 : 1.1;

            // Pan to keep the point under the mouse fixed:
            // Before zoom, the mouse pixel offset from center is (mx - cx, my - cy).
            // After zoom, the same world point would be at a different pixel.
            // Compensate by panning by the difference.
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left - canvas.width / 2;
            const my = e.clientY - rect.top - canvas.height / 2;

            // Pan offset = mouse_offset * (1 - 1/factor) in screen pixels
            const panDx = mx * (1 - 1/factor);
            const panDy = my * (1 - 1/factor);

            state.wasm._wasm_pan(panDx, panDy);
            state.wasm._wasm_zoom(factor);
        } else {
            // Scroll Z slices
            const delta = Math.sign(e.deltaY);
            state.wasm._wasm_scroll(delta);
        }
        fetchVisibleChunks();
        scheduleRender();
        updateLevelInfo();
    }, { passive: false });

    // Pan with mouse drag
    canvas.addEventListener('mousedown', (e) => {
        if (e.button === 0) {
            state.dragging = true;
            state.dragStartX = e.clientX;
            state.dragStartY = e.clientY;
            canvas.style.cursor = 'grabbing';
        }
    });

    window.addEventListener('mousemove', (e) => {
        if (!state.dragging) return;
        const dx = e.clientX - state.dragStartX;
        const dy = e.clientY - state.dragStartY;
        state.dragStartX = e.clientX;
        state.dragStartY = e.clientY;
        // Pan uses screen-pixel deltas (negative because moving the mouse
        // right should shift the origin left)
        state.wasm._wasm_pan(-dx, -dy);
        scheduleRender();
    });

    window.addEventListener('mouseup', () => {
        if (state.dragging) {
            state.dragging = false;
            document.getElementById('viewport').style.cursor = 'default';
            fetchVisibleChunks();
        }
    });

    // Keyboard shortcuts
    window.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT') return;

        switch (e.key) {
            case 'ArrowUp':
            case 'k':
                state.wasm._wasm_scroll(-1);
                fetchVisibleChunks();
                scheduleRender();
                break;
            case 'ArrowDown':
            case 'j':
                state.wasm._wasm_scroll(1);
                fetchVisibleChunks();
                scheduleRender();
                break;
            case 'PageUp':
                state.wasm._wasm_scroll(-10);
                fetchVisibleChunks();
                scheduleRender();
                break;
            case 'PageDown':
                state.wasm._wasm_scroll(10);
                fetchVisibleChunks();
                scheduleRender();
                break;
            case '+':
            case '=':
                state.wasm._wasm_zoom(1.2);
                fetchVisibleChunks();
                scheduleRender();
                updateLevelInfo();
                break;
            case '-':
                state.wasm._wasm_zoom(0.8);
                fetchVisibleChunks();
                scheduleRender();
                updateLevelInfo();
                break;
            case '0':
                // Reset view: re-center at volume center, default zoom
                if (state.levels.length > 0) {
                    const s = state.levels[0].shape;
                    state.wasm._wasm_set_plane(
                        s[2] / 2.0, s[1] / 2.0, s[0] / 2.0,
                        0.0, 0.0, 1.0
                    );
                }
                fetchVisibleChunks();
                scheduleRender();
                updateLevelInfo();
                break;
        }
    });

    // Resize
    window.addEventListener('resize', () => {
        resizeCanvas();
        fetchVisibleChunks();
        scheduleRender();
    });

    // Load button
    document.getElementById('load-btn').addEventListener('click', loadVolume);
    document.getElementById('zarr-url').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') loadVolume();
    });
}

async function loadVolume() {
    const url = document.getElementById('zarr-url').value.trim();
    if (!url) return;

    const btn = document.getElementById('load-btn');
    btn.disabled = true;
    showLoading('Loading zarr metadata...');

    try {
        const canvas = document.getElementById('viewport');
        resizeCanvas();
        state.wasm._wasm_init(canvas.width, canvas.height);

        await loadZarrMetadata(url);
        hideLoading();
        fetchVisibleChunks();
        scheduleRender();
    } catch (e) {
        hideLoading();
        alert('Failed to load volume: ' + e.message);
    } finally {
        btn.disabled = false;
    }
}

// --- Main ---

async function main() {
    const canvas = document.getElementById('viewport');
    resizeCanvas();
    initWebGL(canvas);

    showLoading('Loading WASM module...');

    try {
        state.wasm = await createVC3D();
        hideLoading();
        setupEvents();
        updateStatus();

        // Auto-load if URL has a hash with a zarr path
        const hash = window.location.hash.slice(1);
        if (hash) {
            document.getElementById('zarr-url').value = decodeURIComponent(hash);
            loadVolume();
        }
    } catch (e) {
        hideLoading();
        document.getElementById('loading-text').textContent =
            'Failed to load WASM: ' + e.message;
        document.getElementById('loading-overlay').classList.remove('hidden');
    }
}

main();
</script>
</body>
</html>
