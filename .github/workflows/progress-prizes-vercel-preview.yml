name: Progress Prize Vercel preview gate

run-name: Progress Prize Vercel preview ${{ github.event.client_payload.git.sha }}

on:
  repository_dispatch:
    types:
      - vercel.deployment.ready
      - vercel.deployment.success

permissions: {}

jobs:
  verify:
    name: Verify exact deployed commit
    if: >-
      github.repository == 'ScrollPrize/villa' &&
      github.repository_id == '890972577' &&
      github.repository_owner_id == '121906140' &&
      github.ref == 'refs/heads/main' &&
      github.actor == 'vercel[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment: progress-prizes-preview
    permissions:
      contents: read
      pull-requests: read
      statuses: write
    steps:
      - name: Check out trusted verifier code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: refs/heads/main
          persist-credentials: false
          clean: true
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24

      - name: Mask the protected Vercel project identifier
        shell: bash
        env:
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail
          test -n "$VERCEL_PROJECT_ID"
          case "$VERCEL_PROJECT_ID" in
            *$'\r'*|*$'\n'*) echo "Preview Environment variable has an invalid value." >&2; exit 1 ;;
          esac
          printf '::add-mask::%s\n' "$VERCEL_PROJECT_ID"

      - name: Associate and verify the deployment
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_PATH: ${{ github.event_path }}
          EXPECTED_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import { readFile } from 'node:fs/promises';
          import {
            fetchExpectedProgressPrizeState,
            validateVercelDispatch,
            verifyVercelPreview,
          } from './scrollprize.org/scripts/progress-prizes/vercel-preview.mjs';

          const owner = 'ScrollPrize';
          const repo = 'villa';
          const token = process.env.GH_TOKEN;
          const runUrl = process.env.RUN_URL;
          let associatedSha;

          async function github(path, options = {}) {
            const response = await fetch(`https://api.github.com${path}`, {
              ...options,
              redirect: 'error',
              headers: {
                accept: 'application/vnd.github+json',
                authorization: `Bearer ${token}`,
                'user-agent': 'progress-prize-vercel-gate',
                'x-github-api-version': '2022-11-28',
                ...(options.headers ?? {}),
              },
            });
            if (!response.ok) throw new Error('GitHub association request failed.');
            return response.status === 204 ? undefined : response.json();
          }

          async function status(sha, state, description) {
            await github(`/repos/${owner}/${repo}/statuses/${sha}`, {
              method: 'POST',
              headers: { 'content-type': 'application/json' },
              body: JSON.stringify({
                state,
                context: 'progress-prizes/vercel-preview',
                description,
                target_url: runUrl,
              }),
            });
          }

          function firstString(values) {
            return values.find((value) => typeof value === 'string' && value !== '');
          }

          try {
            if (!process.env.EXPECTED_PROJECT_ID || !process.env.VERCEL_AUTOMATION_BYPASS_SECRET) {
              throw new Error('Preview Environment is not configured.');
            }
            const event = JSON.parse(await readFile(process.env.EVENT_PATH, 'utf8'));
            const payload = event.client_payload ?? {};
            const candidateSha = firstString([
              payload.sha,
              payload.commitSha,
              payload.git?.sha,
              payload.gitSource?.sha,
              payload.meta?.githubCommitSha,
              payload.deployment?.sha,
              payload.deployment?.gitSource?.sha,
              payload.deployment?.meta?.githubCommitSha,
            ]);
            const candidateRef = firstString([
              payload.ref,
              payload.gitRef,
              payload.git?.ref,
              payload.gitSource?.ref,
              payload.meta?.githubCommitRef,
              payload.deployment?.ref,
              payload.deployment?.gitSource?.ref,
              payload.deployment?.meta?.githubCommitRef,
            ]);
            const deployment = validateVercelDispatch({
              event,
              expectedProjectId: process.env.EXPECTED_PROJECT_ID,
              expectedSha: candidateSha,
              expectedRef: candidateRef,
            });
            const branch = deployment.ref.startsWith('refs/heads/')
              ? deployment.ref.slice('refs/heads/'.length)
              : deployment.ref;

            const smokeHead = branch === 'codex/progress-prize-smoke-20260720';
            const smokeBase = branch === 'codex/progress-prize-smoke-base-20260720';
            const productionHead = /^codex\/progress-prize-\d{4}-\d{2}$/.test(branch);
            if (!smokeHead && !smokeBase && !productionHead) {
              throw new Error('Deployment ref is outside the automation allowlist.');
            }

            let associated = false;
            if (smokeBase) {
              const ref = await github(`/repos/${owner}/${repo}/git/ref/heads/${encodeURIComponent(branch)}`);
              associated = ref?.object?.type === 'commit' && ref.object.sha === deployment.sha;
            } else {
              const pulls = await github(
                `/repos/${owner}/${repo}/pulls?state=open&head=${encodeURIComponent(`${owner}:${branch}`)}&per_page=10`,
              );
              const expectedBase = smokeHead ? 'codex/progress-prize-smoke-base-20260720' : 'main';
              associated = Array.isArray(pulls)
                && pulls.length === 1
                && pulls[0].head?.sha === deployment.sha
                && pulls[0].head?.ref === branch
                && pulls[0].base?.ref === expectedBase;
            }
            if (!associated) throw new Error('Deployment does not match trusted GitHub state.');
            associatedSha = deployment.sha;
            await status(associatedSha, 'pending', 'Verifying the exact Vercel preview');

            const expected = await fetchExpectedProgressPrizeState({
              owner,
              repo,
              commitSha: associatedSha,
              githubToken: token,
            });
            await verifyVercelPreview({
              event,
              expectedProjectId: process.env.EXPECTED_PROJECT_ID,
              expectedSha: associatedSha,
              expectedRef: deployment.ref,
              expectedCycle: expected.cycle,
              expectedState: expected,
              protectionBypassSecret: process.env.VERCEL_AUTOMATION_BYPASS_SECRET,
            });
            await status(associatedSha, 'success', 'Exact Progress Prize preview verified');
          } catch {
            if (associatedSha) {
              try {
                await status(associatedSha, 'failure', 'Progress Prize preview verification failed');
              } catch {
                // Preserve the original safe failure.
              }
            }
            throw new Error('Progress Prize preview association or verification failed.');
          }
          NODE
