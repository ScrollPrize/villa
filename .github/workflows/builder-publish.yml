name: Publish builder images

on:
  push:
    branches: [main]
    paths:
      - 'volume-cartographer/*.Dockerfile'
      - 'volume-cartographer/.dockerignore'
      - 'volume-cartographer/scripts/ci.sh'
      - '.github/workflows/builder-publish.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ matrix.image }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish vc-builder:${{ matrix.image }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        image: ["ubuntu-24.04", "ubuntu-26.04"]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        run: volume-cartographer/scripts/ci.sh publish ${{ matrix.image }}
