name: Progress Prize July 20 rehearsal

on:
  workflow_dispatch:
    inputs:
      operation:
        description: Rehearsal segment to execute
        required: true
        type: choice
        default: full-rehearsal
        options:
          - full-rehearsal
          - validate-production
          - bootstrap-staging-source
          - prepare-fault-recovery
          - activation-fault-recovery
          - cleanup-staging
      source-cycle:
        description: Production/staging source cycle
        required: true
        type: string
        default: "2026-07"
      target-cycle:
        description: Staging target cycle
        required: true
        type: string
        default: "2026-08"
      preparation-now:
        description: Simulated instant inside the seven-day preparation window
        required: true
        type: string
        default: "2026-07-25T12:00:00.000Z"
      activation-now:
        description: Simulated instant just after the Pacific July cutoff
        required: true
        type: string
        default: "2026-08-01T07:01:00.000Z"

permissions: {}

concurrency:
  group: progress-prizes-staging-rehearsal
  cancel-in-progress: false

jobs:
  validate-production:
    if: >-
      inputs.operation == 'full-rehearsal' ||
      inputs.operation == 'validate-production' ||
      inputs.operation == 'bootstrap-staging-source' ||
      inputs.operation == 'prepare-fault-recovery' ||
      inputs.operation == 'activation-fault-recovery'
    uses: ./.github/workflows/progress-prizes-google.yml
    permissions:
      contents: read
      id-token: write
    with:
      operation: validate
      environment: production
      source-cycle: ${{ inputs['source-cycle'] }}
      branch: main
      target-branch: main

  bootstrap-staging:
    if: >-
      inputs.operation == 'full-rehearsal' ||
      inputs.operation == 'bootstrap-staging-source' ||
      inputs.operation == 'prepare-fault-recovery' ||
      inputs.operation == 'activation-fault-recovery'
    needs: validate-production
    uses: ./.github/workflows/progress-prizes-google.yml
    permissions:
      contents: read
      id-token: write
    with:
      operation: bootstrap
      environment: staging
      source-cycle: ${{ inputs['source-cycle'] }}
      simulated-now: ${{ inputs['preparation-now'] }}
      branch: codex/progress-prize-smoke-20260720
      target-branch: codex/progress-prize-smoke-base-20260720

  inject-copy-fault:
    if: >-
      inputs.operation == 'full-rehearsal' ||
      inputs.operation == 'prepare-fault-recovery' ||
      inputs.operation == 'activation-fault-recovery'
    needs: bootstrap-staging
    uses: ./.github/workflows/progress-prizes-google.yml
    permissions:
      contents: read
      id-token: write
    with:
      operation: prepare
      environment: staging
      source-cycle: ${{ inputs['source-cycle'] }}
      target-cycle: ${{ inputs['target-cycle'] }}
      simulated-now: ${{ inputs['preparation-now'] }}
      fault: after-copy
      expect-fault: true
      branch: codex/progress-prize-smoke-20260720
      target-branch: codex/progress-prize-smoke-base-20260720

  recover-prepare:
    if: >-
      inputs.operation == 'full-rehearsal' ||
      inputs.operation == 'prepare-fault-recovery' ||
      inputs.operation == 'activation-fault-recovery'
    needs: inject-copy-fault
    uses: ./.github/workflows/progress-prizes-google.yml
    permissions:
      contents: read
      id-token: write
    with:
      operation: prepare
      environment: staging
      source-cycle: ${{ inputs['source-cycle'] }}
      target-cycle: ${{ inputs['target-cycle'] }}
      simulated-now: ${{ inputs['preparation-now'] }}
      branch: codex/progress-prize-smoke-20260720
      target-branch: codex/progress-prize-smoke-base-20260720

  prepare-page:
    if: >-
      inputs.operation == 'full-rehearsal' ||
      inputs.operation == 'prepare-fault-recovery' ||
      inputs.operation == 'activation-fault-recovery'
    needs: recover-prepare
    uses: ./.github/workflows/progress-prizes-page-pr.yml
    permissions:
      contents: write
      pull-requests: write
    with:
      environment: staging
      source-cycle: ${{ inputs['source-cycle'] }}
      target-cycle: ${{ inputs['target-cycle'] }}
      responder-uri: ${{ needs.recover-prepare.outputs['responder-uri'] }}
      head-branch: codex/progress-prize-smoke-20260720
      base-branch: codex/progress-prize-smoke-base-20260720

  verify-prepared:
    if: >-
      inputs.operation == 'full-rehearsal' ||
      inputs.operation == 'prepare-fault-recovery' ||
      inputs.operation == 'activation-fault-recovery'
    needs: prepare-page
    uses: ./.github/workflows/progress-prizes-google.yml
    permissions:
      contents: read
      id-token: write
    with:
      operation: verify
      environment: staging
      source-cycle: ${{ inputs['source-cycle'] }}
      target-cycle: ${{ inputs['target-cycle'] }}
      simulated-now: ${{ inputs['preparation-now'] }}
      verify-mode: prepared
      branch: codex/progress-prize-smoke-20260720
      target-branch: codex/progress-prize-smoke-base-20260720
      head-sha: ${{ needs.prepare-page.outputs['head-sha'] }}

  activation-gate:
    name: Gate the exact smoke commit
    if: inputs.operation == 'full-rehearsal' || inputs.operation == 'activation-fault-recovery'
    needs:
      - prepare-page
      - verify-prepared
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    permissions:
      actions: read
      checks: read
      contents: read
      pull-requests: read
      statuses: read
    outputs:
      head-sha: ${{ steps.gate.outputs['head-sha'] }}
      base-sha: ${{ steps.gate.outputs['base-sha'] }}
      pr-number: ${{ steps.gate.outputs['pr-number'] }}
    steps:
      - name: Check out trusted gate code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: refs/heads/main
          persist-credentials: false
          clean: true
          fetch-depth: 1
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
      - name: Wait for code checks and Vercel
        id: gate
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SOURCE_CYCLE: ${{ inputs['source-cycle'] }}
          TARGET_CYCLE: ${{ inputs['target-cycle'] }}
          EXPECTED_SHA: ${{ needs.prepare-page.outputs['head-sha'] }}
          EXPECTED_BASE_SHA: ${{ needs.prepare-page.outputs['base-sha'] }}
        run: >-
          node .github/progress-prizes-github.mjs gate
          --head codex/progress-prize-smoke-20260720
          --base codex/progress-prize-smoke-base-20260720
          --base-sha "$EXPECTED_BASE_SHA"
          --source-cycle "$SOURCE_CYCLE"
          --cycle "$TARGET_CYCLE"
          --sha "$EXPECTED_SHA"
          --timeout-seconds 1800

  inject-close-fault:
    if: inputs.operation == 'full-rehearsal' || inputs.operation == 'activation-fault-recovery'
    needs: activation-gate
    uses: ./.github/workflows/progress-prizes-google.yml
    permissions:
      contents: read
      id-token: write
    with:
      operation: activate
      environment: staging
      source-cycle: ${{ inputs['source-cycle'] }}
      target-cycle: ${{ inputs['target-cycle'] }}
      simulated-now: ${{ inputs['activation-now'] }}
      fault: after-close-source
      expect-fault: true
      branch: codex/progress-prize-smoke-20260720
      target-branch: codex/progress-prize-smoke-base-20260720
      head-sha: ${{ needs.activation-gate.outputs['head-sha'] }}

  recover-activate:
    if: inputs.operation == 'full-rehearsal' || inputs.operation == 'activation-fault-recovery'
    needs:
      - activation-gate
      - inject-close-fault
    uses: ./.github/workflows/progress-prizes-google.yml
    permissions:
      contents: read
      id-token: write
    with:
      operation: activate
      environment: staging
      source-cycle: ${{ inputs['source-cycle'] }}
      target-cycle: ${{ inputs['target-cycle'] }}
      simulated-now: ${{ inputs['activation-now'] }}
      branch: codex/progress-prize-smoke-20260720
      target-branch: codex/progress-prize-smoke-base-20260720
      head-sha: ${{ needs.activation-gate.outputs['head-sha'] }}

  verify-active:
    if: inputs.operation == 'full-rehearsal' || inputs.operation == 'activation-fault-recovery'
    needs:
      - activation-gate
      - recover-activate
    uses: ./.github/workflows/progress-prizes-google.yml
    permissions:
      contents: read
      id-token: write
    with:
      operation: verify
      environment: staging
      source-cycle: ${{ inputs['source-cycle'] }}
      target-cycle: ${{ inputs['target-cycle'] }}
      simulated-now: ${{ inputs['activation-now'] }}
      verify-mode: active
      branch: codex/progress-prize-smoke-20260720
      target-branch: codex/progress-prize-smoke-base-20260720
      head-sha: ${{ needs.activation-gate.outputs['head-sha'] }}

  merge-smoke:
    name: Ready and merge the activated smoke page
    if: inputs.operation == 'full-rehearsal' || inputs.operation == 'activation-fault-recovery'
    needs:
      - activation-gate
      - verify-active
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    outputs:
      merge-sha: ${{ steps.merge.outputs['merge-sha'] }}
    steps:
      - name: Check out trusted merge code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: refs/heads/main
          persist-credentials: false
          clean: true
          fetch-depth: 1
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
      - name: Merge only the gated SHA
        id: merge
        env:
          GITHUB_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ needs.activation-gate.outputs['head-sha'] }}
          BASE_SHA: ${{ needs.activation-gate.outputs['base-sha'] }}
          PR_NUMBER: ${{ needs.activation-gate.outputs['pr-number'] }}
          SOURCE_CYCLE: ${{ inputs['source-cycle'] }}
          TARGET_CYCLE: ${{ inputs['target-cycle'] }}
        run: >-
          node .github/progress-prizes-github.mjs merge
          --head codex/progress-prize-smoke-20260720
          --base codex/progress-prize-smoke-base-20260720
          --sha "$HEAD_SHA"
          --base-sha "$BASE_SHA"
          --pr-number "$PR_NUMBER"
          --source-cycle "$SOURCE_CYCLE"
          --cycle "$TARGET_CYCLE"

  verify-post-merge-preview:
    name: Verify smoke base preview after merge
    if: inputs.operation == 'full-rehearsal' || inputs.operation == 'activation-fault-recovery'
    needs: merge-smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    permissions:
      actions: read
      contents: read
      statuses: read
    steps:
      - name: Check out trusted gate code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: refs/heads/main
          persist-credentials: false
          clean: true
          fetch-depth: 1
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
      - name: Wait for exact smoke base preview
        env:
          GITHUB_TOKEN: ${{ github.token }}
          MERGE_SHA: ${{ needs.merge-smoke.outputs['merge-sha'] }}
          TARGET_CYCLE: ${{ inputs['target-cycle'] }}
        run: >-
          node .github/progress-prizes-github.mjs wait-preview
          --branch codex/progress-prize-smoke-base-20260720
          --sha "$MERGE_SHA"
          --cycle "$TARGET_CYCLE"
          --timeout-seconds 1800

  prove-activation-idempotency:
    if: inputs.operation == 'full-rehearsal' || inputs.operation == 'activation-fault-recovery'
    needs:
      - activation-gate
      - verify-post-merge-preview
    uses: ./.github/workflows/progress-prizes-google.yml
    permissions:
      contents: read
      id-token: write
    with:
      operation: activate
      environment: staging
      source-cycle: ${{ inputs['source-cycle'] }}
      target-cycle: ${{ inputs['target-cycle'] }}
      simulated-now: ${{ inputs['activation-now'] }}
      branch: codex/progress-prize-smoke-20260720
      target-branch: codex/progress-prize-smoke-base-20260720
      head-sha: ${{ needs.activation-gate.outputs['head-sha'] }}

  cleanup-full-rehearsal:
    if: inputs.operation == 'full-rehearsal'
    needs:
      - prove-activation-idempotency
      - verify-post-merge-preview
    uses: ./.github/workflows/progress-prizes-google.yml
    permissions:
      contents: read
      id-token: write
    with:
      operation: cleanup
      environment: staging
      source-cycle: ${{ inputs['source-cycle'] }}
      target-cycle: ${{ inputs['target-cycle'] }}
      simulated-now: ${{ inputs['activation-now'] }}
      branch: codex/progress-prize-smoke-20260720
      target-branch: codex/progress-prize-smoke-base-20260720

  verify-cleaned-full-rehearsal:
    if: inputs.operation == 'full-rehearsal'
    needs: cleanup-full-rehearsal
    uses: ./.github/workflows/progress-prizes-google.yml
    permissions:
      contents: read
      id-token: write
    with:
      operation: verify
      environment: staging
      source-cycle: ${{ inputs['source-cycle'] }}
      target-cycle: ${{ inputs['target-cycle'] }}
      simulated-now: ${{ inputs['activation-now'] }}
      verify-mode: cleaned
      branch: codex/progress-prize-smoke-20260720
      target-branch: codex/progress-prize-smoke-base-20260720

  cleanup-standalone:
    if: inputs.operation == 'cleanup-staging'
    uses: ./.github/workflows/progress-prizes-google.yml
    permissions:
      contents: read
      id-token: write
    with:
      operation: cleanup
      environment: staging
      source-cycle: ${{ inputs['source-cycle'] }}
      target-cycle: ${{ inputs['target-cycle'] }}
      simulated-now: ${{ inputs['activation-now'] }}
      branch: codex/progress-prize-smoke-20260720
      target-branch: codex/progress-prize-smoke-base-20260720

  verify-cleaned-standalone:
    if: inputs.operation == 'cleanup-staging'
    needs: cleanup-standalone
    uses: ./.github/workflows/progress-prizes-google.yml
    permissions:
      contents: read
      id-token: write
    with:
      operation: verify
      environment: staging
      source-cycle: ${{ inputs['source-cycle'] }}
      target-cycle: ${{ inputs['target-cycle'] }}
      simulated-now: ${{ inputs['activation-now'] }}
      verify-mode: cleaned
      branch: codex/progress-prize-smoke-20260720
      target-branch: codex/progress-prize-smoke-base-20260720
