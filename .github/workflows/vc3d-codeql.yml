name: CodeQL

on:
  # Always trigger on PRs so required checks appear and can succeed fast via a no-op.
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [ main ]  # scan after merge too
    paths:
      - 'volume-cartographer/**'
      - '.github/workflows/vc3d-codeql.yml'
# Keep an on-demand lever now that schedule (which can't be path-filtered) is removed.
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: read
      contents: read
    outputs:
      vc: ${{ steps.filter.outputs.vc }}
    steps:
    # On push events paths-filter uses git and needs a checkout.
      - name: Checkout (non-PR events)
        if: github.event_name != 'pull_request'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Paths filter
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            vc:
              - 'volume-cartographer/**'

  # ⚡ Fast PR scan: no compile, quick feedback
  analyze_fast:
    if: github.event_name == 'pull_request'
    needs: [changes]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      contents: read
    steps:
      - name: No-op (unrelated changes)
        if: needs.changes.outputs.vc != 'true'
        run: echo "✅ No volume-cartographer changes — skipping CodeQL (PR fast scan)."

      - name: Checkout
        if: needs.changes.outputs.vc == 'true'
        uses: actions/checkout@v4

      - name: Initialize CodeQL (no build)
        if: needs.changes.outputs.vc == 'true'
        uses: github/codeql-action/init@v3
        with:
          languages: c-cpp
          build-mode: none
          queries: security-extended
          config-file: .github/codeql/codeql-config.yml

      - name: Analyze
        if: needs.changes.outputs.vc == 'true'
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:c-cpp"

  # 🧪 Deep scan for push/schedule: compiles with fast settings
  analyze_deep:
    if: github.event_name == 'push'
    needs: [changes]
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      security-events: write
      contents: read
      packages: read
    steps:
      - name: No-op (unrelated changes)
        if: needs.changes.outputs.vc != 'true'
        run: echo "✅ No volume-cartographer changes — skipping CodeQL deep scan."

      - name: Checkout
        if: needs.changes.outputs.vc == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # history-aware queries if needed

      - name: Install build deps
        if: needs.changes.outputs.vc == 'true'
        run: |
          set -euxo pipefail
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            build-essential git cmake ninja-build pkg-config \
            qt6-base-dev \
            libboost-system-dev libboost-program-options-dev \
            libceres-dev libsuitesparse-dev \
            libopencv-dev libopencv-contrib-dev \
            libcgal-dev libmpfr-dev libgmp-dev \
            libblosc-dev libzstd-dev libcurl4-openssl-dev \
            nlohmann-json3-dev libavahi-client-dev \
            liblz4-dev libtiff-dev \
            zlib1g-dev gfortran libopenblas-dev liblapack-dev liblapacke-dev \
            libscotch-dev libhwloc-dev

      - name: Initialize CodeQL
        if: needs.changes.outputs.vc == 'true'
        uses: github/codeql-action/init@v3
        with:
          languages: c-cpp
          build-mode: manual
          queries: security-extended,security-and-quality
          config-file: .github/codeql/codeql-config.yml

      - name: Configure (Ninja, fast flags)
        if: needs.changes.outputs.vc == 'true'
        working-directory: ./volume-cartographer
        run: |
          cmake -S . -B build -G Ninja \
                -DVC_TESTING=OFF \
                -DCMAKE_BUILD_TYPE=Debug \
                -DCMAKE_C_COMPILER=gcc \
                -DCMAKE_CXX_COMPILER=g++

      - name: Build (fast)
        if: needs.changes.outputs.vc == 'true'
        working-directory: ./volume-cartographer
        run: cmake --build build --parallel

      - name: Analyze
        if: needs.changes.outputs.vc == 'true'
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:c-cpp"
