name: CodeQL

on:
  # Always trigger on PRs so required checks appear and can succeed fast via a no-op.
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [ main ]  # scan after merge too
    paths:
      - 'volume-cartographer/**'
      - '.github/workflows/vc3d-codeql.yml'
# Keep an on-demand lever now that schedule (which can't be path-filtered) is removed.
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      contents: read
    outputs:
      vc: ${{ steps.filter.outputs.vc }}
    steps:
    # On push events paths-filter uses git and needs a checkout.
      - name: Checkout (non-PR events)
        if: github.event_name != 'pull_request'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Paths filter
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            vc:
              - 'volume-cartographer/**'

  # ⚡ Fast PR scan: no compile, quick feedback
  analyze_fast:
    if: github.event_name == 'pull_request'
    needs: [changes]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      security-events: write
      contents: read
    steps:
      - name: No-op (unrelated changes)
        if: needs.changes.outputs.vc != 'true'
        run: echo "✅ No volume-cartographer changes — skipping CodeQL (PR fast scan)."

      - name: Checkout
        if: needs.changes.outputs.vc == 'true'
        uses: actions/checkout@v4

      - name: Initialize CodeQL (no build)
        if: needs.changes.outputs.vc == 'true'
        uses: github/codeql-action/init@v3
        with:
          languages: c-cpp
          build-mode: none
          queries: security-extended

      - name: Analyze
        if: needs.changes.outputs.vc == 'true'
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:c-cpp"

  # 🧪 Deep scan for push/schedule: compiles with fast settings
  analyze_deep:
    if: github.event_name == 'push'
    needs: [changes]
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      security-events: write
      contents: read
      packages: read
    steps:
      - name: No-op (unrelated changes)
        if: needs.changes.outputs.vc != 'true'
        run: echo "✅ No volume-cartographer changes — skipping CodeQL deep scan."

      - name: Checkout
        if: needs.changes.outputs.vc == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # history-aware queries if needed

      - name: Install build deps
        if: needs.changes.outputs.vc == 'true'
        run: |
          set -euxo pipefail
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            build-essential git cmake ninja-build ccache \
            qt6-base-dev libboost-system-dev libboost-program-options-dev \
            libceres-dev libcgal-dev xtensor-dev libopencv-dev libxsimd-dev libblosc-dev libspdlog-dev \
            libgsl-dev libsdl2-dev libcurl4-openssl-dev libbacktrace-dev

      - name: Restore ccache
        if: needs.changes.outputs.vc == 'true'
        uses: actions/cache/restore@v4
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-vc3d-codeql-${{ hashFiles('volume-cartographer/**/CMakeLists.txt','volume-cartographer/**/*.cmake','.github/workflows/vc3d-codeql.yml') }}
          restore-keys: ccache-${{ runner.os }}-vc3d-codeql-

      - name: Enable ccache
        if: needs.changes.outputs.vc == 'true'
        run: |
          mkdir -p ~/.ccache
          echo 'max_size = 5G' >> ~/.ccache/ccache.conf || true
          echo 'hash_dir = true' >> ~/.ccache/ccache.conf || true
          echo 'compiler_check = content' >> ~/.ccache/ccache.conf || true
          echo "CCACHE_BASEDIR=$GITHUB_WORKSPACE/volume-cartographer" >> $GITHUB_ENV

      - name: Reset ccache stats
        if: needs.changes.outputs.vc == 'true'
        run: ccache -z || true


      - name: Initialize CodeQL
        if: needs.changes.outputs.vc == 'true'
        uses: github/codeql-action/init@v3
        with:
          languages: c-cpp
          build-mode: manual
          queries: security-extended,security-and-quality

      - name: Configure (Ninja, fast flags)
        if: needs.changes.outputs.vc == 'true'
        working-directory: ./volume-cartographer
        run: |
          cmake -S . -B build -G Ninja \
                -DVC_WITH_CUDA_SPARSE=off \
                -DVC_WITH_PASTIX=OFF \
                -DVC_BUILD_TESTS=OFF \
                -DBUILD_TESTING=OFF -DCMAKE_BUILD_TYPE=Debug \
                -DCMAKE_C_COMPILER=gcc \
                -DCMAKE_CXX_COMPILER=g++ \
                -DCMAKE_C_COMPILER_LAUNCHER=ccache \
                -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Verify compiler toolchain
        if: needs.changes.outputs.vc == 'true'
        working-directory: ./volume-cartographer
        run: |
          set -euo pipefail
          rg -n "^(CMAKE_C_COMPILER|CMAKE_CXX_COMPILER|CMAKE_ASM_COMPILER):" build/CMakeCache.txt || true
          if rg -n "^(CMAKE_C_COMPILER|CMAKE_CXX_COMPILER|CMAKE_ASM_COMPILER):.*ccache" build/CMakeCache.txt; then
            echo "Compiler resolved to a ccache wrapper; expected gcc/g++ and launcher-only ccache."
            exit 1
          fi

      - name: Build (fast)
        if: needs.changes.outputs.vc == 'true'
        working-directory: ./volume-cartographer
        run: cmake --build build --parallel

      - name: Show ccache stats
        if: always() && needs.changes.outputs.vc == 'true'
        run: ccache -s || true

      - name: Save ccache
        if: always() && needs.changes.outputs.vc == 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-vc3d-codeql-${{ hashFiles('volume-cartographer/**/CMakeLists.txt','volume-cartographer/**/*.cmake','.github/workflows/vc3d-codeql.yml') }}

      - name: Analyze
        if: needs.changes.outputs.vc == 'true'
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:c-cpp"
