name: Continuous Integration (CI)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  # Trusted main builds populate sccache entries that all subsequent PRs can
  # read. Caches written by pull_request runs are scoped to that PR's merge ref.
  push:
    branches: [main]
    paths:
      - 'volume-cartographer/**'
      - '.github/workflows/vc3d-ci.yml'

permissions:
  contents: read
  packages: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      vc: ${{ steps.filter.outputs.vc }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            vc:
              - 'volume-cartographer/**'
              - '.github/workflows/vc3d-ci.yml'
              - '.github/workflows/vc3d-macos.yml'

  skip:
    name: Skip (no volume-cartographer changes)
    needs: changes
    if: needs.changes.outputs.vc != 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - run: echo "No volume-cartographer changes — skipping build."

  build-test:
    name: ${{ matrix.action }}-${{ matrix.preset }}-${{ matrix.compiler }} (${{ matrix.image }})
    needs: changes
    if: needs.changes.outputs.vc == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    container:
      image: ghcr.io/scrollprize/vc3d-deps/linux:sha-0c371b1d472c5281b703d65517e980d945da693f
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    continue-on-error: ${{ matrix.blocking != true }}
    strategy:
      fail-fast: false
      # Each compiler builds the Release configuration and runs its tests in
      # one blocking job, avoiding a second full Debug build.
      matrix:
        include:
          - { image: "ubuntu-26.04", compiler: gcc,   preset: ci-release-tests, action: test, blocking: true }
          - { image: "ubuntu-26.04", compiler: clang, preset: ci-release-tests, action: test, blocking: true }
    env:
      SCCACHE_GHA_ENABLED: 'true'
      SCCACHE_IGNORE_SERVER_IO_ERROR: '1'
      SCCACHE_C_CUSTOM_CACHE_BUSTER: vc3d-linux-ubuntu-26.04-deps-0c371b1d-${{ matrix.compiler }}-${{ matrix.preset }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up shared compiler cache
        uses: mozilla-actions/sccache-action@v0.0.10
        with:
          version: v0.15.0
      - name: ${{ matrix.action }}
        working-directory: volume-cartographer
        run: |
          preset="${{ matrix.preset }}-${{ matrix.compiler }}"
          sccache --zero-stats
          cmake --preset "$preset" -DVC_USE_SCCACHE=ON
          ninja -C "build/$preset"
          ctest --preset "$preset"
          QT_QPA_PLATFORM=offscreen python3 apps/VC3D/agent_bridge/test/smoke_offscreen.py \
            --vc3d "build/$preset/bin/VC3D"
          sccache --show-stats

  mcp-test:
    name: MCP unit tests
    needs: changes
    if: needs.changes.outputs.vc == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install MCP bridge
        working-directory: volume-cartographer/tools/vc3d-mcp
        run: python -m pip install -e .
      - name: Test MCP bridge
        working-directory: volume-cartographer/tools/vc3d-mcp
        env:
          PYTHONWARNINGS: error::ResourceWarning
        run: python -m unittest discover -p 'test*.py'

  # macOS compile is a hard PR gate (parity with the Ubuntu Release cells).
  # Full packaging and packaged-app smoke checks run after merge and on releases.
  macos-build:
    name: macOS compile (${{ matrix.os }}, Homebrew LLVM)
    needs: changes
    # The packaging workflow builds and seeds this same toolchain on main.
    # Keep the required compile gate on PRs without rebuilding it after merge.
    if: needs.changes.outputs.vc == 'true' && github.event_name == 'pull_request'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    env:
      HOMEBREW_NO_AUTO_UPDATE: '1'
      HOMEBREW_NO_INSTALL_CLEANUP: '1'
      SCCACHE_GHA_ENABLED: 'true'
      SCCACHE_IGNORE_SERVER_IO_ERROR: '1'
      SCCACHE_C_CUSTOM_CACHE_BUSTER: vc3d-macos-15-arm64-homebrew-llvm-deps-b21145c7
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: ScrollPrize/vc3d-deps
          ref: b21145c78af694a0fc574249a3f7ae6f037f8bea
          path: vc3d-deps

      - uses: oras-project/setup-oras@v1

      - name: Restore prebuilt Homebrew dependencies
        env:
          GHCR_TOKEN: ${{ github.token }}
        run: |
          printf '%s' "$GHCR_TOKEN" | oras login ghcr.io -u '${{ github.actor }}' --password-stdin
          oras pull ghcr.io/scrollprize/vc3d-deps/macos:sha-b21145c78af694a0fc574249a3f7ae6f037f8bea -o "$RUNNER_TEMP"
          "$GITHUB_WORKSPACE/vc3d-deps/macos/restore.sh" \
            "$RUNNER_TEMP/vc3d-macos-15-arm64.tar.zst"

      - name: Set up shared compiler cache
        uses: mozilla-actions/sccache-action@v0.0.10
        with:
          version: v0.15.0

      - name: Configure + build
        run: volume-cartographer/scripts/build_macos.sh --sccache

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Test MCP bridge
        working-directory: volume-cartographer/tools/vc3d-mcp
        run: |
          python -m pip install -e .
          python -m unittest discover -p 'test*.py'

  ci:
    name: CI
    needs: [changes, skip, build-test, mcp-test, macos-build]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    steps:
      - name: Aggregate required-check result
        env:
          R_CHANGES: ${{ needs.changes.result }}
          R_SKIP: ${{ needs.skip.result }}
          R_BUILD_TEST: ${{ needs.build-test.result }}
          R_MCP_TEST: ${{ needs.mcp-test.result }}
          R_MACOS: ${{ needs.macos-build.result }}
        run: |
          set -e
          echo "changes=$R_CHANGES skip=$R_SKIP build-test=$R_BUILD_TEST mcp-test=$R_MCP_TEST macos=$R_MACOS"
          # All non-skipped jobs must succeed (or be skipped legitimately).
          fail=0
          for r in "$R_CHANGES" "$R_SKIP" "$R_BUILD_TEST" "$R_MCP_TEST" "$R_MACOS"; do
            case "$r" in
              success|skipped) ;;
              *) fail=1 ;;
            esac
          done
          if [ "$fail" -ne 0 ]; then
            echo "One or more required CI jobs failed or were cancelled."
            exit 1
          fi
          echo "All required CI jobs passed."
