name: Continuous Integration (CI)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  packages: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      vc: ${{ steps.filter.outputs.vc }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            vc:
              - 'volume-cartographer/**'
              - '.github/workflows/vc3d-ci.yml'

  skip:
    name: Skip (no volume-cartographer changes)
    needs: changes
    if: needs.changes.outputs.vc != 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - run: echo "No volume-cartographer changes — skipping build."

  build-test:
    name: ${{ matrix.action }}-${{ matrix.preset }}-${{ matrix.compiler }} (${{ matrix.image }})
    needs: changes
    if: needs.changes.outputs.vc == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    container:
      image: ghcr.io/scrollprize/vc3d-deps/linux:sha-0c371b1d472c5281b703d65517e980d945da693f
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    continue-on-error: ${{ matrix.blocking != true }}
    strategy:
      fail-fast: false
      # Each compiler builds the Release configuration and runs its tests in
      # one blocking job, avoiding a second full Debug build.
      matrix:
        include:
          - { image: "ubuntu-26.04", compiler: gcc,   preset: ci-release-tests, action: test, blocking: true }
          - { image: "ubuntu-26.04", compiler: clang, preset: ci-release-tests, action: test, blocking: true }
    env:
      CCACHE_DIR: ${{ github.workspace }}/volume-cartographer/.ccache
      CCACHE_BASEDIR: ${{ github.workspace }}/volume-cartographer
      CCACHE_MAXSIZE: 3G
      CCACHE_COMPRESS: 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Restore compiler cache
        uses: actions/cache@v4
        with:
          path: volume-cartographer/.ccache
          key: vc3d-${{ matrix.image }}-${{ matrix.compiler }}-${{ matrix.preset }}-ccache-v1-${{ github.sha }}
          restore-keys: |
            vc3d-${{ matrix.image }}-${{ matrix.compiler }}-${{ matrix.preset }}-ccache-v1-
      - name: ${{ matrix.action }}
        working-directory: volume-cartographer
        run: |
          preset="${{ matrix.preset }}-${{ matrix.compiler }}"
          ccache --zero-stats
          cmake --preset "$preset" -DVC_USE_CCACHE=ON
          ninja -C "build/$preset"
          ctest --preset "$preset"
          ccache --show-stats

  # macOS compile is a hard gate (parity with the Ubuntu Release cells).
  # Smoke + toolchain-verifier run in a separate job that is non-blocking for
  # now; promote that to a gate once it's been stable for a while.
  macos-build:
    name: macOS compile (${{ matrix.os }}, Homebrew LLVM)
    needs: changes
    if: needs.changes.outputs.vc == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    env:
      HOMEBREW_NO_AUTO_UPDATE: '1'
      HOMEBREW_NO_INSTALL_CLEANUP: '1'
      CCACHE_DIR: ${{ github.workspace }}/volume-cartographer/.ccache/macos-homebrew-llvm
      CCACHE_BASEDIR: ${{ github.workspace }}/volume-cartographer
      CCACHE_MAXSIZE: 3G
      CCACHE_COMPRESS: 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: ScrollPrize/vc3d-deps
          ref: b21145c78af694a0fc574249a3f7ae6f037f8bea
          path: vc3d-deps

      - uses: oras-project/setup-oras@v1

      - name: Restore prebuilt Homebrew dependencies
        env:
          GHCR_TOKEN: ${{ github.token }}
        run: |
          printf '%s' "$GHCR_TOKEN" | oras login ghcr.io -u '${{ github.actor }}' --password-stdin
          oras pull ghcr.io/scrollprize/vc3d-deps/macos:sha-b21145c78af694a0fc574249a3f7ae6f037f8bea -o "$RUNNER_TEMP"
          "$GITHUB_WORKSPACE/vc3d-deps/macos/restore.sh" \
            "$RUNNER_TEMP/vc3d-macos-15-arm64.tar.zst"

      - name: Restore compiler cache
        uses: actions/cache@v4
        with:
          path: volume-cartographer/.ccache/macos-homebrew-llvm
          key: vc3d-${{ matrix.os }}-homebrew-llvm-ccache-v1-${{ github.sha }}
          restore-keys: |
            vc3d-${{ matrix.os }}-homebrew-llvm-ccache-v1-

      - name: Configure + build
        run: volume-cartographer/scripts/build_macos.sh --ccache

  ci:
    name: CI
    needs: [changes, skip, build-test, macos-build]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    steps:
      - name: Aggregate required-check result
        env:
          R_CHANGES: ${{ needs.changes.result }}
          R_SKIP: ${{ needs.skip.result }}
          R_BUILD_TEST: ${{ needs.build-test.result }}
          R_MACOS: ${{ needs.macos-build.result }}
        run: |
          set -e
          echo "changes=$R_CHANGES skip=$R_SKIP build-test=$R_BUILD_TEST macos=$R_MACOS"
          # All non-skipped jobs must succeed (or be skipped legitimately).
          fail=0
          for r in "$R_CHANGES" "$R_SKIP" "$R_BUILD_TEST" "$R_MACOS"; do
            case "$r" in
              success|skipped) ;;
              *) fail=1 ;;
            esac
          done
          if [ "$fail" -ne 0 ]; then
            echo "One or more required CI jobs failed or were cancelled."
            exit 1
          fi
          echo "All required CI jobs passed."
