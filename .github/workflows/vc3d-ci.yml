name: Continuous Integration (CI)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      vc: ${{ steps.filter.outputs.vc }}
      dockerfile: ${{ steps.filter.outputs.dockerfile }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            vc:
              - 'volume-cartographer/**'
              - '.github/workflows/vc3d-ci.yml'
            dockerfile:
              - 'volume-cartographer/Dockerfile'
              - 'volume-cartographer/.dockerignore'
              - 'volume-cartographer/scripts/ci.sh'
              - 'volume-cartographer/scripts/install_build_deps.sh'

  skip:
    name: Skip (no volume-cartographer changes)
    needs: changes
    if: needs.changes.outputs.vc != 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - run: echo "No volume-cartographer changes — skipping build."

  build-test:
    name: ${{ matrix.action }}-${{ matrix.preset }}-${{ matrix.compiler }} (${{ matrix.image }})
    needs: changes
    if: needs.changes.outputs.vc == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    continue-on-error: ${{ matrix.blocking != true }}
    strategy:
      fail-fast: false
      # Each compiler builds the Release configuration and runs its tests in
      # one blocking job, avoiding a second full Debug build.
      matrix:
        include:
          - { image: "ubuntu-26.04", compiler: gcc,   preset: ci-release-tests, action: test, blocking: true }
          - { image: "ubuntu-26.04", compiler: clang, preset: ci-release-tests, action: test, blocking: true }
    env:
      VC_BUILDER_FORCE_LOCAL: ${{ needs.changes.outputs.dockerfile == 'true' && '1' || '0' }}
      VC_CCACHE_MAXSIZE: 3G
    steps:
      - uses: actions/checkout@v4
      - name: Restore compiler cache
        uses: actions/cache@v4
        with:
          path: volume-cartographer/.ccache
          key: vc3d-${{ matrix.image }}-${{ matrix.compiler }}-${{ matrix.preset }}-ccache-v1-${{ github.sha }}
          restore-keys: |
            vc3d-${{ matrix.image }}-${{ matrix.compiler }}-${{ matrix.preset }}-ccache-v1-
      - uses: docker/setup-buildx-action@v3
      - name: Pull or build builder image
        run: volume-cartographer/scripts/ci.sh builder ${{ matrix.image }}
      - name: ${{ matrix.action }}
        run: volume-cartographer/scripts/ci.sh ${{ matrix.action }} ${{ matrix.image }} ${{ matrix.compiler }} ${{ matrix.preset }}

  # macOS compile is a hard gate (parity with the Ubuntu Release cells).
  # Smoke + toolchain-verifier run in a separate job that is non-blocking for
  # now; promote that to a gate once it's been stable for a while.
  macos-build:
    name: macOS compile (${{ matrix.os }}, Homebrew LLVM)
    needs: changes
    if: needs.changes.outputs.vc == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    env:
      CCACHE_DIR: ${{ github.workspace }}/volume-cartographer/.ccache/macos-homebrew-llvm
      CCACHE_BASEDIR: ${{ github.workspace }}/volume-cartographer
      CCACHE_MAXSIZE: 3G
      CCACHE_COMPRESS: 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15]
    steps:
      - uses: actions/checkout@v4

      - name: Restore compiler cache
        uses: actions/cache@v4
        with:
          path: volume-cartographer/.ccache/macos-homebrew-llvm
          key: vc3d-${{ matrix.os }}-homebrew-llvm-ccache-v1-${{ github.sha }}
          restore-keys: |
            vc3d-${{ matrix.os }}-homebrew-llvm-ccache-v1-

      # Cache the Homebrew downloads (bottle tarballs + API index). The
      # install of qt/opencv/ceres/llvm/etc. is the dominant cost — caching
      # downloads keeps the second run under ~10 min.
      - name: Cache Homebrew downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew/downloads
            ~/Library/Caches/Homebrew/api
          key: brew-${{ matrix.os }}-${{ hashFiles('volume-cartographer/scripts/build_macos.sh') }}
          restore-keys: |
            brew-${{ matrix.os }}-

      - name: brew update
        run: brew update

      - name: Configure + build (installs Homebrew deps as needed)
        run: volume-cartographer/scripts/build_macos.sh --install-deps --ccache

  ci:
    name: CI
    needs: [changes, skip, build-test, macos-build]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    steps:
      - name: Aggregate required-check result
        env:
          R_CHANGES: ${{ needs.changes.result }}
          R_SKIP: ${{ needs.skip.result }}
          R_BUILD_TEST: ${{ needs.build-test.result }}
          R_MACOS: ${{ needs.macos-build.result }}
        run: |
          set -e
          echo "changes=$R_CHANGES skip=$R_SKIP build-test=$R_BUILD_TEST macos=$R_MACOS"
          # All non-skipped jobs must succeed (or be skipped legitimately).
          fail=0
          for r in "$R_CHANGES" "$R_SKIP" "$R_BUILD_TEST" "$R_MACOS"; do
            case "$r" in
              success|skipped) ;;
              *) fail=1 ;;
            esac
          done
          if [ "$fail" -ne 0 ]; then
            echo "One or more required CI jobs failed or were cancelled."
            exit 1
          fi
          echo "All required CI jobs passed."
