name: Continuous Integration (CI)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-24.04
    outputs:
      vc: ${{ steps.filter.outputs.vc }}
      dockerfile: ${{ steps.filter.outputs.dockerfile }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            vc:
              - 'volume-cartographer/**'
              - '.github/workflows/vc3d-ci.yml'
            dockerfile:
              - 'volume-cartographer/*.Dockerfile'
              - 'volume-cartographer/.dockerignore'
              - 'volume-cartographer/scripts/ci.sh'

  skip:
    name: Skip (no volume-cartographer changes)
    needs: changes
    if: needs.changes.outputs.vc != 'true'
    runs-on: ubuntu-24.04
    steps:
      - run: echo "No volume-cartographer changes — skipping build."

  builder:
    name: Builder image (${{ matrix.image }})
    needs: changes
    if: needs.changes.outputs.vc == 'true'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        image: ["ubuntu-24.04", "ubuntu-26.04"]
    env:
      # If the PR touched a Dockerfile (or ci.sh), the published ghcr image
      # is stale for this PR. Force a local build with the GHA buildx cache.
      # Otherwise ci.sh builder will docker pull the published image.
      VC_BUILDER_FORCE_LOCAL: ${{ needs.changes.outputs.dockerfile == 'true' && '1' || '0' }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Pull or build builder image
        run: volume-cartographer/scripts/ci.sh builder ${{ matrix.image }}

  build-test:
    name: ${{ matrix.action }}-${{ matrix.preset }}-${{ matrix.compiler }} (${{ matrix.image }})
    needs: [changes, builder]
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      # ubuntu-24.04: compile-only smoke (Release, no tests).
      # ubuntu-26.04: full test + sanitizer matrix.
      # Coverage and dead-code (defined below) also run on ubuntu-26.04.
      matrix:
        include:
          - { image: "ubuntu-24.04", compiler: gcc,   preset: ci-release,    action: compile }
          - { image: "ubuntu-24.04", compiler: clang, preset: ci-release,    action: compile }
          - { image: "ubuntu-26.04", compiler: gcc,   preset: ci-tests,      action: test }
          - { image: "ubuntu-26.04", compiler: clang, preset: ci-tests,      action: test }
          # Sanitizer cells are clang-only — clang's runtime is more
          # complete (TySan, NSan) and we don't need duplicate gcc coverage.
          - { image: "ubuntu-26.04", compiler: clang, preset: ci-asan-ubsan, action: test }
          - { image: "ubuntu-26.04", compiler: clang, preset: ci-tsan,       action: test }
          - { image: "ubuntu-26.04", compiler: clang, preset: ci-tysan,      action: test }
          - { image: "ubuntu-26.04", compiler: clang, preset: ci-nsan,       action: test }
    env:
      VC_BUILDER_FORCE_LOCAL: ${{ needs.changes.outputs.dockerfile == 'true' && '1' || '0' }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: actions/cache@v4
        with:
          path: volume-cartographer/.ccache/${{ matrix.image }}
          key: ccache-${{ matrix.image }}-${{ matrix.compiler }}-${{ matrix.preset }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ matrix.image }}-${{ matrix.compiler }}-${{ matrix.preset }}-
            ccache-${{ matrix.image }}-${{ matrix.compiler }}-
      - name: Pull or build builder image
        run: volume-cartographer/scripts/ci.sh builder ${{ matrix.image }}
      - name: ${{ matrix.action }}
        run: volume-cartographer/scripts/ci.sh ${{ matrix.action }} ${{ matrix.image }} ${{ matrix.compiler }} ${{ matrix.preset }}

  coverage:
    name: Coverage (gcc, gcov)
    needs: [changes, builder]
    runs-on: ubuntu-24.04
    env:
      VC_BUILDER_FORCE_LOCAL: ${{ needs.changes.outputs.dockerfile == 'true' && '1' || '0' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: docker/setup-buildx-action@v3
      - uses: actions/cache@v4
        with:
          path: volume-cartographer/.ccache/ubuntu-26.04
          key: ccache-ubuntu-26.04-coverage-${{ github.run_id }}
          restore-keys: |
            ccache-ubuntu-26.04-coverage-
            ccache-ubuntu-26.04-gcc-
      - name: Pull or build builder image
        run: volume-cartographer/scripts/ci.sh builder ubuntu-26.04
      - name: Run coverage
        run: volume-cartographer/scripts/ci.sh coverage ubuntu-26.04
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: volume-cartographer/coverage/
      - name: Print coverage summary
        run: |
          {
            echo "## Total coverage"
            echo '```'
            cat volume-cartographer/coverage/summary.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Patch coverage gate (vs base branch)
        if: github.event_name == 'pull_request'
        env:
          PATCH_COVERAGE_MIN: '0'
        run: |
          volume-cartographer/scripts/ci.sh patch-coverage origin/${{ github.base_ref }} ubuntu-26.04
          {
            echo "## Patch coverage (vs ${{ github.base_ref }}, gate ≥ ${PATCH_COVERAGE_MIN}%)"
            cat volume-cartographer/coverage/patch.md
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Total coverage non-regression vs base branch
        if: github.event_name == 'pull_request'
        run: volume-cartographer/scripts/ci.sh coverage-regression origin/${{ github.base_ref }} ubuntu-26.04

  dead-code:
    name: Dead-code report (clang, nm + --print-gc-sections)
    needs: [changes, builder]
    runs-on: ubuntu-24.04
    env:
      VC_BUILDER_FORCE_LOCAL: ${{ needs.changes.outputs.dockerfile == 'true' && '1' || '0' }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: actions/cache@v4
        with:
          path: volume-cartographer/.ccache/ubuntu-26.04
          key: ccache-ubuntu-26.04-dead-code-${{ github.run_id }}
          restore-keys: |
            ccache-ubuntu-26.04-dead-code-
            ccache-ubuntu-26.04-clang-
      - name: Pull or build builder image
        run: volume-cartographer/scripts/ci.sh builder ubuntu-26.04
      - name: Run dead-code analysis
        run: volume-cartographer/scripts/ci.sh dead-code ubuntu-26.04 clang
      - uses: actions/upload-artifact@v4
        with:
          name: dead-code
          path: volume-cartographer/dead-code/
      - name: Step summary
        run: |
          {
            echo "## Dead-code report"
            echo '```'
            cat volume-cartographer/dead-code/summary.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
