name: Continuous Integration (CI)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-24.04
    outputs:
      vc: ${{ steps.filter.outputs.vc }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            vc:
              - 'volume-cartographer/**'
              - '.github/workflows/vc3d-ci.yml'

  skip:
    name: Skip (no volume-cartographer changes)
    needs: changes
    if: needs.changes.outputs.vc != 'true'
    runs-on: ubuntu-24.04
    steps:
      - run: echo "No volume-cartographer changes — skipping build."

  build-test:
    name: ${{ matrix.preset }}-${{ matrix.compiler }} (${{ matrix.image }})
    needs: changes
    if: needs.changes.outputs.vc == 'true'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        image: ["ubuntu-24.04", "ubuntu-26.04", "alpine-3.21"]
        compiler: [gcc, clang]
        preset: [ci-tests, ci-asan-ubsan]
        include:
          - image: "ubuntu-24.04"
            dockerfile: "ubuntu-24.04-noble.Dockerfile"
          - image: "ubuntu-26.04"
            dockerfile: "ubuntu-26.04.Dockerfile"
          - image: "alpine-3.21"
            dockerfile: "alpine.Dockerfile"
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build builder image
        uses: docker/build-push-action@v6
        with:
          context: ./volume-cartographer
          file: ./volume-cartographer/${{ matrix.dockerfile }}
          target: builder
          tags: vc-builder:${{ matrix.image }}
          load: true
          cache-from: type=gha,scope=vc-builder-${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=vc-builder-${{ matrix.image }}

      - name: Restore ccache
        uses: actions/cache/restore@v4
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-vc-${{ matrix.image }}-${{ matrix.compiler }}-${{ matrix.preset }}-${{ hashFiles('volume-cartographer/**/CMakeLists.txt','volume-cartographer/**/*.cmake','volume-cartographer/CMakePresets.json') }}
          restore-keys: |
            ccache-vc-${{ matrix.image }}-${{ matrix.compiler }}-${{ matrix.preset }}-
            ccache-vc-${{ matrix.image }}-${{ matrix.compiler }}-

      - name: Configure (${{ matrix.preset }}-${{ matrix.compiler }})
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/volume-cartographer:/src \
            -v ${{ github.workspace }}/.ccache:/root/.ccache \
            -e CCACHE_DIR=/root/.ccache \
            -w /src \
            vc-builder:${{ matrix.image }} \
            cmake --preset ${{ matrix.preset }}-${{ matrix.compiler }}

      - name: Build
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/volume-cartographer:/src \
            -v ${{ github.workspace }}/.ccache:/root/.ccache \
            -e CCACHE_DIR=/root/.ccache \
            -w /src \
            vc-builder:${{ matrix.image }} \
            cmake --build --preset ${{ matrix.preset }}-${{ matrix.compiler }}

      - name: Test
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/volume-cartographer:/src \
            -w /src \
            vc-builder:${{ matrix.image }} \
            ctest --preset ${{ matrix.preset }}-${{ matrix.compiler }}

      - name: ccache stats
        if: always()
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/.ccache:/root/.ccache \
            -e CCACHE_DIR=/root/.ccache \
            vc-builder:${{ matrix.image }} \
            ccache -s || true

      - name: Save ccache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-vc-${{ matrix.image }}-${{ matrix.compiler }}-${{ matrix.preset }}-${{ hashFiles('volume-cartographer/**/CMakeLists.txt','volume-cartographer/**/*.cmake','volume-cartographer/CMakePresets.json') }}
