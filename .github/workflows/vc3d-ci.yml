name: Continuous Integration (CI)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-24.04
    outputs:
      vc: ${{ steps.filter.outputs.vc }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            vc:
              - 'volume-cartographer/**'
              - '.github/workflows/vc3d-ci.yml'

  skip:
    name: Skip (no volume-cartographer changes)
    needs: changes
    if: needs.changes.outputs.vc != 'true'
    runs-on: ubuntu-24.04
    steps:
      - run: echo "No volume-cartographer changes — skipping build."

  build-test:
    name: ${{ matrix.preset }}-${{ matrix.compiler }} (${{ matrix.image }})
    needs: changes
    if: needs.changes.outputs.vc == 'true'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        image: ["ubuntu-24.04", "ubuntu-26.04"]
        compiler: [gcc, clang]
        preset: [ci-tests, ci-asan-ubsan]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build builder image
        run: volume-cartographer/scripts/ci.sh builder ${{ matrix.image }}
      - name: Test
        run: volume-cartographer/scripts/ci.sh test ${{ matrix.image }} ${{ matrix.compiler }} ${{ matrix.preset }}

  coverage:
    name: Coverage (gcc, gcov)
    needs: changes
    if: needs.changes.outputs.vc == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: docker/setup-buildx-action@v3
      - name: Build builder image
        run: volume-cartographer/scripts/ci.sh builder ubuntu-24.04
      - name: Run coverage
        run: volume-cartographer/scripts/ci.sh coverage ubuntu-24.04
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: volume-cartographer/coverage/
      - name: Print coverage summary
        run: |
          {
            echo "## Total coverage"
            echo '```'
            cat volume-cartographer/coverage/summary.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Patch coverage gate (vs base branch)
        if: github.event_name == 'pull_request'
        env:
          PATCH_COVERAGE_MIN: '0'
        run: |
          volume-cartographer/scripts/ci.sh patch-coverage origin/${{ github.base_ref }}
          {
            echo "## Patch coverage (vs ${{ github.base_ref }}, gate ≥ ${PATCH_COVERAGE_MIN}%)"
            cat volume-cartographer/coverage/patch.md
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Total coverage non-regression vs base branch
        if: github.event_name == 'pull_request'
        run: volume-cartographer/scripts/ci.sh coverage-regression origin/${{ github.base_ref }}
