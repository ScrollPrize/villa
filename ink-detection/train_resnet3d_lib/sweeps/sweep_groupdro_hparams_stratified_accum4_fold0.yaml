program: train_resnet3d.py
project: ink-2um-experiments
entity: vesuvius-challenge
method: random

metric:
  name: val/worst_group_loss_ema.min
  goal: minimize

parameters:
  training.objective:
    value: group_dro
  training.loss_mode:
    value: per_sample
  training.sampler:
    value: group_stratified
  training.cv_fold:
    value: 0


  training.accumulate_grad_batches:
    value: 4

  training.epochs:
    value: 60

  training.lr:
    distribution: log_uniform_values
    min: 2e-5
    max: 1.5e-3

  training.weight_decay:
    distribution: log_uniform_values
    min: 1e-6
    max: 1.0

  group_dro.robust_step_size:
    values: [0.01, 0.05, 0.1, 0.2]

  stitch.all_val:
    value: true
  stitch.train:
    value: true
  stitch.downsample:
    value: 1
  wandb.tags:
    value:
      - ink-2um
      - group_dro
      - hparam_sweep
      - group_stratified
      - accum4
      - fold0

command:
  - ${env}
  - ${interpreter}
  - ${program}
  - --metadata_json
  - metadata.json
  - --outputs_path
  - /pscratch/cpa232_scrollprize/data/philodemos/2um_dataset/villa/ink-detection/train_scrolls
