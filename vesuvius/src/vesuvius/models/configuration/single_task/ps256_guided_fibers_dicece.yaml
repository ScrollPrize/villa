# Binary fiber segmentation guided by a frozen dinovol-v2 backbone.
#
# Modeled after ps256_guided_medial.yaml (the srf_2um guided surface run) but
# adapted for the cross-frame fibers pipeline:
#   * dataset_type: cross_frame, same image/labels/transform as ps256_fibers_dicece.
#   * guide_backbone points at the shift005_jitter105 / r342500_paris4_20260416
#     checkpoint (iter 352500, newest file in that output dir).
#   * loss is nnUNet_DC_and_CE_loss (the codebase does not expose a standalone
#     SkeletonRecall via YAML -- MedialSurfaceRecall is the combined
#     Dice+SkeletonRecall+CE -- so per user instruction we fall back to Dice+CE).
#   * wandb_project: fibers (separate from srf_2um).
#
# Invocation (run on GPU 1):
#   uv run vesuvius.train \
#     --config src/vesuvius/models/configuration/single_task/ps256_guided_fibers_dicece.yaml \
#     --input /home/ubuntu/fibers_cache \
#     --output /home/ubuntu/fibers_ckpts_guided \
#     --gpus 1 \
#     --wandb-project fibers --wandb-entity vesuvius-challenge

tr_setup:
  wandb_project: "fibers"
  wandb_entity: "vesuvius-challenge"
  model_name: "ps256_guided_fibers_dicece"
  tr_val_split: 0.85

tr_config:
  patch_size: [256, 256, 256]
  batch_size: 1
  num_dataloader_workers: 6
  enable_deep_supervision: false
  max_epoch: 1000
  max_steps_per_epoch: 250
  max_val_steps_per_epoch: 50
  optimizer: "SGD"
  initial_lr: 0.01
  weight_decay: 0.00003
  compile_policy: "off"
  ddp_find_unused_parameters: false
  guide_loss_weight: 0.25
  guide_supervision_target: "fibers"

model_config:
  guide_backbone: "/ephemeral/outputs_v2_shift005_jitter105_r342500_paris4_20260416/checkpoint_step_352500.pt"
  guide_freeze: true
  guide_tokenbook_tokens: 256
  guide_tokenbook_dropout: 0.0
  guide_tokenbook_sample_rate: 1.0
  guide_tokenbook_ema_decay: null
  guide_tokenbook_use_ema: false
  input_shape: [256, 256, 256]

dataset_config:
  dataset_type: "cross_frame"
  image_zarr_url: "s3://vesuvius-challenge-open-data/PHercParis4/volumes/20260411134726-2.400um-0.2m-78keV-masked.zarr/0"
  labels_zarr_url: "/ephemeral/fibers_labels/s1a-fibers-230125-ome.zarr/0"
  transform_json_url: "s3://vesuvius-challenge-open-data/PHercParis4/volumes/20260411134726-2.400um-0.2m-78keV-masked.zarr/transform.json"
  storage_options:
    anon: true
  labels_scan_level: 3

  min_labeled_ratio: 0.001
  min_bbox_percent: 0.35
  normalization_scheme: "zscore"
  targets:
    fibers:
      out_channels: 2
      activation: "none"
      losses:
        - name: "nnUNet_DC_and_CE_loss"
          weight: 1.0
