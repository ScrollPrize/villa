tr_config:
  patch_size: [256, 256, 256]
  batch_size: 1
  enable_deep_supervision: false
  guide_loss_weight: 0.0

model_config:
  guide_backbone: "/home/giorgio/Projects/dino-vesuvius/dino-checkpoints/checkpoint_step_342500.pt"
  guide_fusion_stage: "direct_segmentation"
  guide_compile_policy: "all_guidance"
  guide_freeze: true
  input_shape: [256, 256, 256]

dataset_config:
  min_labeled_ratio: 0
  min_bbox_percent: 0
  normalization_scheme: "zscore"
  skip_patch_validation: true
  targets:
    surface:
      out_channels: 2
      activation: "none"
      losses:
        - name: "MedialSurfaceRecall"
          weight: 1.0
