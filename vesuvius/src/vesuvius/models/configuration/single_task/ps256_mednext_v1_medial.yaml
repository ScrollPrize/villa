tr_config:
  patch_size: [256,256,256]
  enable_deep_supervision: false

model_config:
  architecture_type: "mednext_v1"
  mednext_model_id: "B"
  mednext_kernel_size: 3

dataset_config:
  min_labeled_ratio: 0
  min_bbox_percent: 0
  normalization_scheme: "zscore"
  skip_patch_validation: true
  targets:
    surface:
      activation: "none"
      losses:
        - name: "MedialSurfaceRecall"
          weight: 1.0
