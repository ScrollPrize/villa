# Binary fiber segmentation using the dinovol-v2 backbone as a frozen
# encoder + pixelshuffle-conv decoder head. Modeled after
# ps256_pretrained_dino_pixelshuffle_medial.yaml.
#
# Differences:
#   * dataset_type: cross_frame (same image/labels/transform as the plain
#     fibers config).
#   * pretrained_backbone: /ephemeral/.../checkpoint_step_352500.pt (the
#     shift005_jitter105 / r342500_paris4_20260416 dinovol checkpoint).
#   * loss: nnUNet_DC_and_CE_loss (SkeletonRecall isn't exposed standalone;
#     per user instruction we fall back to Dice+CE).
#   * wandb_project: fibers.
#
# Invocation (runs on GPU 1 in a dedicated tmux session):
#   uv run vesuvius.train \
#     --config src/vesuvius/models/configuration/single_task/ps256_pretrained_dino_pixelshuffle_fibers.yaml \
#     --input /home/ubuntu/fibers_cache \
#     --output /home/ubuntu/fibers_ckpts_pixelshuffle \
#     --gpus 1 \
#     --wandb-project fibers --wandb-entity vesuvius-challenge

tr_setup:
  wandb_project: "fibers"
  wandb_entity: "vesuvius-challenge"
  model_name: "ps128_bs16_pretrained_dino_pixelshuffle_fibers"
  tr_val_split: 0.85

tr_config:
  patch_size: [128, 128, 128]
  batch_size: 16
  num_dataloader_workers: 14
  enable_deep_supervision: false
  max_epoch: 1000
  max_steps_per_epoch: 250
  max_val_steps_per_epoch: 50
  optimizer: "SGD"
  initial_lr: 0.01
  weight_decay: 0.00003
  compile_policy: "off"
  ddp_find_unused_parameters: false

model_config:
  pretrained_backbone: "/ephemeral/outputs_v2_shift005_jitter105_r342500_paris4_20260416/checkpoint_step_352500.pt"
  pretrained_decoder_type: "pixelshuffle_conv"
  freeze_encoder: true
  input_shape: [128, 128, 128]

dataset_config:
  dataset_type: "cross_frame"
  image_zarr_url: "s3://vesuvius-challenge-open-data/PHercParis4/volumes/20260411134726-2.400um-0.2m-78keV-masked.zarr/0"
  labels_zarr_url: "/ephemeral/fibers_labels/s1a-fibers-230125-ome.zarr/0"
  transform_json_url: "s3://vesuvius-challenge-open-data/PHercParis4/volumes/20260411134726-2.400um-0.2m-78keV-masked.zarr/transform.json"
  storage_options:
    anon: true
  labels_scan_level: 3

  min_labeled_ratio: 0.001
  min_bbox_percent: 0.35
  normalization_scheme: "zscore"
  targets:
    fibers:
      out_channels: 2
      activation: "none"
      losses:
        - name: "nnUNet_DC_and_CE_loss"
          weight: 1.0
