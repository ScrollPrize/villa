tr_config:
  patch_size: [256, 256, 256]
  batch_size: 1
  guide_loss_weight: 0.0

model_config:
  guide_backbone: "/home/giorgio/Projects/dino-vesuvius/dino-checkpoints/checkpoint_step_342500.pt"
  guide_fusion_stage: "feature_encoder"
  guide_freeze: true
  guide_tokenbook_tokens: 256
  guide_tokenbook_prototype_weighting: "token_mlp"
  guide_tokenbook_dropout: 0.0
  guide_tokenbook_sample_rate: 1.0
